name: Publish NPM

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required to use OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4

      - name: Install Packages.
        run: pnpm i --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: publish
        run: pnpm publish --provenance --access publicm --no-git-checks
